services:
  db-viewer:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    container_name: greencycle-db-viewer
    ports:
      - "5555:5555"
    env_file:
      - .env
    # --- THÊM DÒNG NÀY ĐỂ PRISMA STUDIO NHẬN KẾT NỐI TỪ NGOÀI ---
    environment:
      - HOST=0.0.0.0
    # ---------------------------------------------------------
    volumes:
      - .:/app
      - /app/node_modules
    # --- SỬA LẠI LỆNH COMMAND (XÓA --hostname) ---
    command: sh -c "npx prisma generate && npx prisma db push && npx prisma studio --browser none --port 5555"